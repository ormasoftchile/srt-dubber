name: Windows Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies (choco)
        run: choco install ffmpeg ninja -y

      - name: Download miniaudio.h
        run: |
          if (!(Test-Path vendor)) { New-Item -ItemType Directory -Path vendor }
          curl -L https://raw.githubusercontent.com/mackron/miniaudio/master/miniaudio.h -o vendor/miniaudio.h

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build
        run: cmake --build build -j4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: srt-dubber-windows
          path: build/srt-dubber.exe
